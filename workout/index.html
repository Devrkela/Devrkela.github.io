<!DOCTYPE>
<html>
    <head>
        <link rel="manifest" href="/manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="./UX.css" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <button class="menu" aria-haspopup="true" aria-expanded="false" aria-controls="side_sheet">
                <span class="material-symbols-outlined">
                    menu
                </span>
            </button>
            <button class="statistic">
                <span class="material-symbols-outlined">
                    monitoring
                </span>
            </button>
        </header>
        <ul id="side_sheet" role="menu">
            <li role="none"><a href="/">Entrainement du jour</a></li>
            <li role="none"><a href="/workout/">Programmes</a></li>
        </ul>
        <main>
            <h3>Programme</h3>
            <button>Ajoutez un nouveau programme</button>
            <modal>
                <header>
                    <button>
                        <span class="material-symbols-outlined">
                            arrow_back
                        </span>
                    </button>
                </header>
                <div class="content">

                    <label>
                        <textarea rows="2" class="name" name="name" placeholder="Saisissez le nom de votre programme"></textarea>                    
                    </label>
                    <div>
                        <h4>Sections</h4>
                        <ul>
                            <li>
                                <a class="split" href="/workout/id/splits/id">
                                    Échauffement
                                    <div>
                                        8 exercices
                                    </div>
                                </a>
                            </li>
                            <li>
                                <a class="split" href="/workout/id/splits/id">
                                    Tirage
                                    <div>
                                        4 exercices
                                    </div>
                                </a>
                            </li>
                            <li>
                                <a class="split" href="/workout/id/splits/id">
                                    Poussée
                                    <div>
                                        4 exercices
                                    </div>
                                </a>
                            </li>
                            <li>
                                <a class="split" href="/workout/id/splits/id">
                                    Jambes
                                    <div>
                                        3 exercices
                                    </div>
                                </a>
                            </li>
                        </ul>
                        <button id="add_split">ajoutez une section</button>
                    </div>
                    <button id="add_workout">ajoutez votre programme</button>
                </div>
                
            </modal>
        </main>
        <footer>
        </footer>
    </body>
</html>
